version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: jobqueue-db
    environment:
      POSTGRES_DB: jobqueue
      POSTGRES_USER: jobqueue
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secure_password_change_me}
      POSTGRES_INITDB_ARGS: "-E UTF8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobqueue"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - jobqueue-network

  # Job Queue Application (Producer + Consumer)
  jobqueue-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jobqueue-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/jobqueue
      DB_USER: jobqueue
      DB_PASSWORD: ${DB_PASSWORD:-secure_password_change_me}
      WORKER_COUNT: 3
      LOG_LEVEL: INFO
    ports:
      - "8080:8080"
    networks:
      - jobqueue-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  # Optional: Multiple workers (scale horizontally)
  jobqueue-worker:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/jobqueue
      DB_USER: jobqueue
      DB_PASSWORD: ${DB_PASSWORD:-secure_password_change_me}
      WORKER_MODE: consumer_only
      LOG_LEVEL: INFO
    networks:
      - jobqueue-network
    restart: unless-stopped
    deploy:
      replicas: 2  # Run 2 additional workers
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  # Optional: Prometheus for metrics (if implemented)
  # prometheus:
  #   image: prom/prometheus:latest
  #   container_name: jobqueue-prometheus
  #   ports:
  #     - "9090:9090"
  #   volumes:
  #     - ./prometheus.yml:/etc/prometheus/prometheus.yml
  #     - prometheus_data:/prometheus
  #   command:
  #     - '--config.file=/etc/prometheus/prometheus.yml'
  #     - '--storage.tsdb.path=/prometheus'
  #   networks:
  #     - jobqueue-network

  # Optional: Grafana for visualization
  # grafana:
  #   image: grafana/grafana:latest
  #   container_name: jobqueue-grafana
  #   ports:
  #     - "3000:3000"
  #   environment:
  #     GF_SECURITY_ADMIN_PASSWORD: admin
  #   volumes:
  #     - grafana_data:/var/lib/grafana
  #   networks:
  #     - jobqueue-network

networks:
  jobqueue-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  # prometheus_data:
  #   driver: local
  # grafana_data:
  #   driver: local