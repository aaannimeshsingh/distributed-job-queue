services:
  - type: web
    name: job-queue-api
    runtime: docker
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: jobqueue-db
          property: connectionString

databases:
  - name: jobqueue-db
    databaseName: jobqueue
    user: jobqueue
    plan: free
