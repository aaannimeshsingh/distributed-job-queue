services:
  - type: web
    name: job-queue-api
    env: java
    buildCommand: mvn clean package
    startCommand: java -jar target/job-queue-api.jar
    envVars:
      - key: PORT
        value: 8080
      - key: DATABASE_URL
        fromDatabase:
          name: jobqueue-db
          property: connectionString
databases:
  - name: jobqueue-db
    databaseName: jobqueue
    user: jobqueue
